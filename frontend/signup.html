<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 8px;
  width: 300px;
  text-align: center;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

a { text-decoration: none; }
</style>

</head>
<body>

<div class="card">
<h2>Signup</h2>

<form id="signupForm">
  <input type="text" id="name" placeholder="Name" required>
  <input type="text" id="lastname" placeholder="Lastname" required>
  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Password" required>
  <input type="text" id="number" placeholder="Phone" required>
  <button type="submit">Signup</button>
</form>

<p>Already have account? <a href="login.html">Login</a></p>
</div>

<script>
document.getElementById("signupForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    lastname: document.getElementById("lastname").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    number: document.getElementById("number").value
  };

  try {
    const res = await fetch("http://localhost:5500/api/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.status === "SUCCESS") {
      alert("Signup successful");
      window.location.href = "login.html";
    } else {
      alert(result.message);
    }

  } catch (err) {
    console.log(err);
  }
});
</script>

</body>
</html>
